<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <!-- 哑光黑底 -->
    <radialGradient id="bg-light" cx="50%" cy="35%" r="70%">
      <stop offset="0%" style="stop-color:#1C1814;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#141210;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0A0A0A;stop-opacity:1" />
    </radialGradient>

    <!-- 紫色圆形徽章 -->
    <radialGradient id="purple-badge" cx="45%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#C084FC;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#A855F7;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5B21B6;stop-opacity:1" />
    </radialGradient>

    <!-- 深金属金渐变 -->
    <linearGradient id="gold-text" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A843;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#C49B3C;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#B8860B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A67C2E;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 哑光黑背景 -->
  <rect x="0" y="0" width="400" height="500" fill="url(#bg-light)"/>

  <!-- 紫色徽章 -->
  <g transform="translate(200, 98)">
    <circle cx="0" cy="0" r="58" fill="url(#purple-badge)"/>
    <ellipse cx="-18" cy="-16" rx="26" ry="18" fill="#FFFFFF" opacity="0.1"
             transform="rotate(-25, -18, -16)"/>
    <circle cx="0" cy="0" r="57" fill="none" stroke="#C49B3C" stroke-width="1.2" opacity="0.5"/>
    <circle cx="0" cy="0" r="59.5" fill="none" stroke="#FFD700" stroke-width="0.6" opacity="0.25"/>

    <!-- 白色X -->
    <g transform="translate(0, 2)">
      <path d="M-23,-26 L23,26" stroke="#FFFFFF" stroke-width="13" stroke-linecap="round"/>
      <path d="M23,-26 L-23,26" stroke="#FFFFFF" stroke-width="13" stroke-linecap="round"/>
    </g>
  </g>

  <!-- PhotonWealth · Xinnova — 深金属金 -->
  <text x="200" y="215" text-anchor="middle"
        font-family="'Inter','Helvetica Neue',Arial,sans-serif"
        font-size="24" font-weight="700" letter-spacing="2.5"
        fill="url(#gold-text)">PhotonWealth · Xinnova</text>

  <!-- FROM PHOTON TO WEALTH — 紫色全大写 -->
  <text x="200" y="255" text-anchor="middle"
        font-family="'Inter','Helvetica Neue',Arial,sans-serif"
        font-size="12" font-weight="600" letter-spacing="5"
        fill="#7C3AED" opacity="0.85">FROM PHOTON TO WEALTH</text>

  <!-- 金分割线 -->
  <line x1="130" y1="280" x2="270" y2="280" stroke="#C49B3C" stroke-width="0.5" opacity="0.25"/>

  <!-- BUILD THE EDGE. CASH IT OUT. — 白色 -->
  <text x="200" y="315" text-anchor="middle"
        font-family="'Inter','Helvetica Neue',Arial,sans-serif"
        font-size="10" font-weight="400" letter-spacing="4"
        fill="#FFFFFF" opacity="0.55">BUILD THE EDGE. CASH IT OUT.</text>
</svg>
