    <circle cx="0" cy="0" r="87" fill="none" stroke="#FFD700" stroke-width="0.6" opacity="0.2"/>

    <g transform="translate(0, 2)">
      <path d="M-34,-38 L34,38" stroke="#FFFFFF" stroke-width="19" stroke-linecap="round"/>
      <path d="M34,-38 L-34,38" stroke="#FFFFFF" stroke-width="19" stroke-linecap="round"/>
