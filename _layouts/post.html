---
layout: default
---
<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <div class="post-meta">
      <time datetime="{{ page.date | date: '%Y-%m-%d' }}">{{ page.date | date: '%B %d, %Y' }}</time>
      {% if page.author %} &middot; {{ page.author }}{% endif %}
    </div>
  </header>

  <div class="post-content">
    {{ content }}
  </div>

  <nav class="post-nav">
    {% if page.previous.url %}
      <a href="{{ site.baseurl }}{{ page.previous.url }}" class="post-nav-prev">&larr; {{ page.previous.title }}</a>
    {% endif %}
    {% if page.next.url %}
      <a href="{{ site.baseurl }}{{ page.next.url }}" class="post-nav-next">{{ page.next.title }} &rarr;</a>
    {% endif %}
  </nav>
</article>
